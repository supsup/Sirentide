name: ci

# Sirentide's gallery/eyes pins drive a real headless Chrome (via the vendored
# BrewShot). A runner without Chrome would assume-SKIP them and report the suite
# as green — a green that tested nothing. This installs a real Chrome and sets
# SIRENTIDE_REQUIRE_CHROME so any skip becomes a build failure: the browser pins
# must actually run.

on:
  push:
    branches: [main]      # gate main; PRs cover feature branches
  pull_request:
  workflow_dispatch:      # manual "Run workflow" for on-demand branch checks

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIRENTIDE_REQUIRE_CHROME: "1"        # turn assume-skips into hard failures
      BREWSHOT_CHROME_ARGS: "--no-sandbox" # CI Chrome has no sandbox privileges
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Google Chrome (stable) + fonts
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu-core fonts-noto-core
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome-stable --version

      - name: Build + full suite (browser pins required — skips fail)
        run: ./gradlew build --no-daemon --stacktrace
